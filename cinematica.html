<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinemática - Créditos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Raleway', sans-serif;
    width: 100vw;
    height: 100vh;
  }

  /* ─── PANTALLA INICIO ─── */
  #intro-screen {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, #0a0025 0%, #000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 1.2s ease;
  }
  #intro-screen.fade-out { opacity: 0; pointer-events: none; }

  .intro-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.18em;
    text-shadow: 0 0 40px #7c3aed, 0 0 80px #4f1d96;
    margin-bottom: 0.3em;
    animation: titlePulse 3s ease-in-out infinite;
  }
  .intro-subtitle {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: #a78bfa;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 3.5em;
    opacity: 0.85;
  }
  @keyframes titlePulse {
    0%,100% { text-shadow: 0 0 40px #7c3aed, 0 0 80px #4f1d96; }
    50%      { text-shadow: 0 0 60px #a855f7, 0 0 120px #7c3aed; }
  }

  #btn-creditos {
    position: relative;
    padding: 1em 3em;
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 2vw, 1.3rem);
    font-weight: 700;
    letter-spacing: 0.2em;
    color: #fff;
    background: transparent;
    border: 2px solid #7c3aed;
    border-radius: 3px;
    cursor: pointer;
    overflow: hidden;
    transition: color 0.3s, border-color 0.3s;
  }
  #btn-creditos::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #7c3aed, #db2777);
    opacity: 0;
    transition: opacity 0.35s;
    z-index: -1;
  }
  #btn-creditos:hover::before { opacity: 1; }
  #btn-creditos:hover { border-color: #db2777; }
  #btn-creditos .btn-glow {
    position: absolute;
    inset: -2px;
    border-radius: 5px;
    background: conic-gradient(from 0deg, #7c3aed, #db2777, #f59e0b, #7c3aed);
    z-index: -2;
    filter: blur(8px);
    opacity: 0;
    transition: opacity 0.35s;
    animation: rotateBorder 3s linear infinite;
  }
  #btn-creditos:hover .btn-glow { opacity: 0.7; }
  @keyframes rotateBorder {
    to { filter: blur(8px) hue-rotate(360deg); }
  }

  /* Estrellas fondo intro */
  .star-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .star-bg canvas { width: 100%; height: 100%; }

  /* ─── CINEMÁTICA ─── */
  #cinematic {
    position: fixed;
    inset: 0;
    display: none;
    overflow: hidden;
  }

  #space-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Naves */
  .ship {
    position: absolute;
    width: 90px;
    height: 90px;
    will-change: transform;
    filter: drop-shadow(0 0 10px var(--glow));
    user-select: none;
    pointer-events: none;
  }
  .ship img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .ship-label {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #fff;
    text-shadow: 0 0 8px var(--glow);
    white-space: nowrap;
  }

  /* Créditos overlay */
  #credits-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .credit-line {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    transition: opacity 1.2s ease;
    white-space: nowrap;
  }
  .credit-line.show { opacity: 1; }
  .credit-line.hide { opacity: 0; }

  .credit-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 900;
    color: #fbbf24;
    text-shadow: 0 0 20px #f59e0b, 0 0 40px #d97706;
    letter-spacing: 0.12em;
  }
  .credit-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 2.2vw, 1.7rem);
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 15px rgba(255,255,255,0.6);
    letter-spacing: 0.08em;
  }
  .credit-role {
    font-family: 'Raleway', sans-serif;
    font-size: clamp(0.75rem, 1.5vw, 1rem);
    font-weight: 300;
    color: #c4b5fd;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .credit-special {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(90deg, #f59e0b, #ec4899, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(245,158,11,0.5));
    letter-spacing: 0.15em;
  }

  /* Barra de progreso */
  #progress-bar-wrap {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: min(340px, 80vw);
    z-index: 20;
    opacity: 0;
    transition: opacity 1s;
  }
  #progress-bar-wrap.visible { opacity: 1; }
  #progress-bar-bg {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7c3aed, #db2777, #f59e0b);
    border-radius: 2px;
    transition: width 0.5s linear;
  }
  #progress-label {
    text-align: center;
    margin-top: 8px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  /* Partículas */
  #particle-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- ═══════════ PANTALLA DE INICIO ═══════════ -->
<div id="intro-screen">
  <canvas class="star-bg" id="intro-stars"></canvas>
  <div class="intro-title">✦ FELIZ ANIVERSARIO ✦</div>
  <div class="intro-subtitle">CAPITULO 1</div>
  <button id="btn-creditos" onclick="startCinematic()">
    <span class="btn-glow"></span>
    CRÉDITOS
  </button>
</div>

<!-- ═══════════ CINEMÁTICA ═══════════ -->
<div id="cinematic">
  <!-- Fondo espacial -->
  <canvas id="space-canvas"></canvas>

  <!-- Partículas / polvo estelar -->
  <canvas id="particle-canvas"></canvas>

  <!-- Naves (las imágenes deben estar en la misma carpeta) -->
  <div class="ship" id="ship-brandon" style="--glow:#60a5fa;">
    <img src="nave_brandon.png" alt="Nave Brandon" onerror="this.parentElement.querySelector('img').style.display='none';this.parentElement.style.fontSize='48px';this.parentElement.innerHTML+='🚀';">
    <div class="ship-label">Brandon</div>
  </div>
  <div class="ship" id="ship-kleydi" style="--glow:#f472b6;">
    <img src="nave_kleydi.png" alt="Nave Kleydi" onerror="this.parentElement.querySelector('img').style.display='none';this.parentElement.innerHTML+='🛸';">
    <div class="ship-label">Kleydi</div>
  </div>
  <div class="ship" id="ship-nahomy" style="--glow:#34d399;">
    <img src="nave_nahomy.png" alt="Nave Nahomy" onerror="this.parentElement.querySelector('img').style.display='none';this.parentElement.innerHTML+='🛩️';">
    <div class="ship-label">Nahomy</div>
  </div>
  <div class="ship" id="ship-cj" style="--glow:#fbbf24;">
    <img src="nave_cj.png" alt="Nave C-J" onerror="this.parentElement.querySelector('img').style.display='none';this.parentElement.innerHTML+='🚀';">
    <div class="ship-label">C-J</div>
  </div>

  <!-- Créditos overlay -->
  <div id="credits-overlay"></div>

  <!-- Barra de progreso -->
  <div id="progress-bar-wrap">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">TE AMO</div>
  </div>
</div>

<!-- Audio -->
<audio id="bgMusic" loop>
  <source src="musicwins.mp3" type="audio/mpeg">
</audio>

<script>
// ═══════════════════════════════════════════
//  ESTRELLAS INTRO
// ═══════════════════════════════════════════
(function initIntroStars() {
  const c = document.getElementById('intro-stars');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    stars = Array.from({length: 220}, () => ({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.008 + 0.003
    }));
  }
  window.addEventListener('resize', resize);
  resize();
  let raf;
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    stars.forEach(s => {
      s.a += s.speed;
      const alpha = (Math.sin(s.a) * 0.5 + 0.5) * 0.9 + 0.1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    raf = requestAnimationFrame(draw);
  }
  draw();
  window._stopIntroStars = () => cancelAnimationFrame(raf);
})();

// ═══════════════════════════════════════════
//  ARRANCAR CINEMÁTICA
// ═══════════════════════════════════════════
function startCinematic() {
  const intro = document.getElementById('intro-screen');
  intro.classList.add('fade-out');

  const music = document.getElementById('bgMusic');
  music.volume = 0;
  music.play().catch(() => {});
  // Fade in music
  let vol = 0;
  const fadeIn = setInterval(() => {
    vol = Math.min(vol + 0.04, 0.85);
    music.volume = vol;
    if (vol >= 0.85) clearInterval(fadeIn);
  }, 120);

  setTimeout(() => {
    intro.style.display = 'none';
    if (window._stopIntroStars) window._stopIntroStars();
    document.getElementById('cinematic').style.display = 'block';
    initCinematic();
  }, 1200);
}

// ═══════════════════════════════════════════
//  CINEMÁTICA PRINCIPAL
// ═══════════════════════════════════════════
function initCinematic() {
  const DURATION = 100 * 1000; // 1:40 en ms
  const startTime = performance.now();

  // ── Fondo espacial (atardecer + estrellas) ──
  const spaceCanvas = document.getElementById('space-canvas');
  const sCtx = spaceCanvas.getContext('2d');
  let W, H;

  function resizeCanvas() {
    W = spaceCanvas.width = window.innerWidth;
    H = spaceCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Estrellas de fondo
  const bgStars = Array.from({length: 280}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.6 + 0.2,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.015 + 0.005
  }));

  // Nebulosas (círculos suaves)
  const nebulae = [
    { x: 0.15, y: 0.3,  r: 0.22, col: 'rgba(124,58,237,0.08)'  },
    { x: 0.75, y: 0.25, r: 0.18, col: 'rgba(219,39,119,0.07)'  },
    { x: 0.5,  y: 0.6,  r: 0.28, col: 'rgba(245,158,11,0.05)'  },
    { x: 0.85, y: 0.65, r: 0.15, col: 'rgba(52,211,153,0.06)'  },
  ];

  // ── Partículas de polvo ──
  const pCanvas = document.getElementById('particle-canvas');
  const pCtx = pCanvas.getContext('2d');
  pCanvas.width = W; pCanvas.height = H;
  const particles = Array.from({length: 60}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 2 + 0.5,
    a: Math.random() * 0.4 + 0.1,
    col: ['#f59e0b','#a78bfa','#f472b6','#34d399'][Math.floor(Math.random()*4)]
  }));

  function drawBackground(progress) {
    // Gradiente atardecer que evoluciona
    const p = Math.min(progress, 1);
    // Inicio: atardecer cálido | Final: noche profunda
    const topR = Math.round(lerp(2, 0, p));
    const topG = Math.round(lerp(0, 0, p));
    const topB = Math.round(lerp(15, 8, p));
    const midR = Math.round(lerp(60, 10, p));
    const midG = Math.round(lerp(15, 5, p));
    const midB = Math.round(lerp(80, 40, p));
    const botR = Math.round(lerp(200, 60, p));
    const botG = Math.round(lerp(80, 15, p));
    const botB = Math.round(lerp(20, 80, p));

    const grad = sCtx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0,   `rgb(${topR},${topG},${topB})`);
    grad.addColorStop(0.45,`rgb(${midR},${midG},${midB})`);
    grad.addColorStop(1,   `rgb(${botR},${botG},${botB})`);
    sCtx.fillStyle = grad;
    sCtx.fillRect(0, 0, W, H);

    // Nebulosas
    nebulae.forEach(n => {
      const grd = sCtx.createRadialGradient(n.x*W, n.y*H, 0, n.x*W, n.y*H, n.r*Math.min(W,H));
      grd.addColorStop(0, n.col);
      grd.addColorStop(1, 'transparent');
      sCtx.fillStyle = grd;
      sCtx.beginPath();
      sCtx.arc(n.x*W, n.y*H, n.r*Math.min(W,H), 0, Math.PI*2);
      sCtx.fill();
    });

    // Estrellas
    const t = performance.now() / 1000;
    bgStars.forEach(s => {
      const alpha = (Math.sin(s.twinkle + t * s.speed * 4) * 0.35 + 0.65) * (0.3 + progress * 0.7);
      sCtx.beginPath();
      sCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      sCtx.fillStyle = `rgba(255,255,255,${alpha})`;
      sCtx.fill();
    });

    // Sol/luna en el horizonte
    const sunY = H * (0.72 + p * 0.1);
    const sunGrad = sCtx.createRadialGradient(W*0.5, sunY, 0, W*0.5, sunY, 90);
    const sunA = Math.max(0, 1 - p * 1.8);
    sunGrad.addColorStop(0, `rgba(255,200,80,${sunA * 0.9})`);
    sunGrad.addColorStop(0.3, `rgba(255,120,30,${sunA * 0.6})`);
    sunGrad.addColorStop(1, 'transparent');
    sCtx.fillStyle = sunGrad;
    sCtx.fillRect(0, 0, W, H);
  }

  function drawParticles() {
    pCanvas.width = W;
    pCanvas.height = H;
    pCtx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x = (p.x + p.vx + W) % W;
      p.y = (p.y + p.vy + H) % H;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      pCtx.fillStyle = p.col;
      pCtx.globalAlpha = p.a * 0.6;
      pCtx.fill();
      pCtx.globalAlpha = 1;
    });
  }

  // ── Naves ──
  const ships = [
    { el: document.getElementById('ship-brandon'), col: '#60a5fa' },
    { el: document.getElementById('ship-kleydi'),  col: '#f472b6' },
    { el: document.getElementById('ship-nahomy'),  col: '#34d399' },
    { el: document.getElementById('ship-cj'),      col: '#fbbf24' },
  ];

  const SZ = 90;
  const MARGIN = 40;
  const MIN_DIST = SZ * 1.6; // distancia mínima entre naves

  // Posiciones iniciales bien separadas
  const initialPositions = [
    { x: 0.15, y: 0.35 },
    { x: 0.7,  y: 0.2  },
    { x: 0.4,  y: 0.65 },
    { x: 0.82, y: 0.55 },
  ];

  ships.forEach((s, i) => {
    const spd = 0.6 + Math.random() * 0.5;
    const angle = Math.random() * Math.PI * 2;
    s.x = initialPositions[i].x * W;
    s.y = initialPositions[i].y * H;
    s.vx = Math.cos(angle) * spd;
    s.vy = Math.sin(angle) * spd;
    s.wobble = Math.random() * Math.PI * 2;
    s.wobbleSpeed = 0.4 + Math.random() * 0.4;
    s.targetAngle = angle;
    s.currentAngle = angle;
  });

  function updateShips() {
    // Actualizar posición
    ships.forEach(s => {
      s.wobble += s.wobbleSpeed * 0.016;
      // Pequeño meandro orgánico
      const wobbleX = Math.sin(s.wobble) * 0.12;
      const wobbleY = Math.cos(s.wobble * 0.7) * 0.10;

      s.x += s.vx + wobbleX;
      s.y += s.vy + wobbleY;

      // Rebote en bordes
      if (s.x < MARGIN)         { s.x = MARGIN;       s.vx = Math.abs(s.vx); }
      if (s.x > W - SZ - MARGIN){ s.x = W-SZ-MARGIN;  s.vx = -Math.abs(s.vx); }
      if (s.y < MARGIN)         { s.y = MARGIN;        s.vy = Math.abs(s.vy); }
      if (s.y > H - SZ - MARGIN){ s.y = H-SZ-MARGIN;  s.vy = -Math.abs(s.vy); }

      // Velocidad constante
      const spd = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
      const target = 0.7 + Math.random()*0.01;
      if (spd > 0.01) {
        s.vx = (s.vx/spd) * target;
        s.vy = (s.vy/spd) * target;
      }
    });

    // Separación entre naves (evitar colisión)
    for (let i = 0; i < ships.length; i++) {
      for (let j = i+1; j < ships.length; j++) {
        const a = ships[i], b = ships[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < MIN_DIST && dist > 0.01) {
          const force = (MIN_DIST - dist) / MIN_DIST * 0.8;
          const nx = dx/dist, ny = dy/dist;
          a.vx -= nx * force * 0.5;
          a.vy -= ny * force * 0.5;
          b.vx += nx * force * 0.5;
          b.vy += ny * force * 0.5;
        }
      }
    }

    // Posicionar elementos DOM
    ships.forEach(s => {
      s.el.style.left = s.x + 'px';
      s.el.style.top  = s.y + 'px';
    });
  }

  // ── Sistema de créditos ──
  const creditData = [
    // [tiempoInicio(s), duracion(s), html, top%]
    [2,   7,  '<div class="credit-special">✦ FELIZ ANIVERSARIO ✦</div>', '20%'],
    [4,   5,  '<div class="credit-role">gracias por este viaje</div>', '29%'],

    [12,  6,  '<div class="credit-title">los queiro mucho</div>', '15%'],
    [14,  8,  '<div class="credit-role"> Kleydi · Nahomy · C-J</div>', '23%'],

    [25,  6,  '<div class="credit-title">capitan del apocalipto</div>', '12%'],
    [26,  7,  '<div class="credit-name">Brandon</div>', '20%'],
    [27,  6,  '<div class="credit-role">la E.U.D y el no tienen buena relacion</div>', '29%'],

    [38,  6,  '<div class="credit-title">Capitana del Genesis</div>', '12%'],
    [39,  7,  '<div class="credit-name">Kleydi</div>', '20%'],
    [40,  6,  '<div class="credit-role">primer recluta de la E.U.D</div>', '29%'],

    [51,  6,  '<div class="credit-title">Aspirante a capitana</div>', '12%'],
    [52,  7,  '<div class="credit-name">Nahomy</div>', '20%'],
    [53,  6,  '<div class="credit-role">la E.U.D quiere darle la nave fenix</div>', '29%'],

    [64,  6,  '<div class="credit-title">Reclutas Estrella</div>', '12%'],
    [65,  7,  '<div class="credit-name">C-J</div>', '20%'],
    [66,  6,  '<div class="credit-role">la E.U.D los quiere mantener muy cerca</div>', '29%'],

    [77,  7,  '<div class="credit-title">Juntos Surcan el Universo</div>', '18%'],
    [79,  6,  '<div class="credit-role">Como guardianes de esta aventura</div>', '27%'],

    [88,  8,  '<div class="credit-special">FELIZ 2 AÑOS</div>', '20%'],
    [90,  8,  '<div class="credit-role">Gracias por ser parte de esta aventura</div>', '30%'],
  ];

  const overlay = document.getElementById('credits-overlay');
  const activeCredits = new Map();
  let creditId = 0;

  function updateCredits(elapsedSec) {
    creditData.forEach((c, idx) => {
      const [start, dur, html, top] = c;
      const end = start + dur;
      const key = idx;

      if (elapsedSec >= start && elapsedSec < end + 1.5) {
        if (!activeCredits.has(key)) {
          const div = document.createElement('div');
          div.className = 'credit-line';
          div.style.top = top;
          div.innerHTML = html;
          overlay.appendChild(div);
          activeCredits.set(key, div);
          // Forzar reflow para animación
          void div.offsetWidth;
          div.classList.add('show');
        }
        // Fade out cerca del final
        const div = activeCredits.get(key);
        if (elapsedSec >= end - 0.5) {
          div.classList.remove('show');
          div.classList.add('hide');
          setTimeout(() => { if(div.parentNode) div.parentNode.removeChild(div); }, 1300);
          activeCredits.delete(key);
        }
      }
    });
  }

  // Barra de progreso
  const progressWrap = document.getElementById('progress-bar-wrap');
  const progressFill = document.getElementById('progress-bar-fill');
  setTimeout(() => progressWrap.classList.add('visible'), 2000);

  // ── Loop principal ──
  let running = true;

  function mainLoop(now) {
    if (!running) return;
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / DURATION, 1);

    // Fondo
    drawBackground(progress);
    // Partículas
    drawParticles();
    // Naves
    updateShips();
    // Créditos
    updateCredits(elapsed / 1000);
    // Progreso
    progressFill.style.width = (progress * 100) + '%';

    if (progress < 1) {
      requestAnimationFrame(mainLoop);
    } else {
      // Fundido a negro final
      fadeToDark();
    }
  }

  requestAnimationFrame(mainLoop);

  function fadeToDark() {
    running = false;
    const fade = document.createElement('div');
    fade.style.cssText = 'position:fixed;inset:0;background:#000;opacity:0;z-index:999;transition:opacity 3s ease;';
    document.body.appendChild(fade);
    void fade.offsetWidth;
    fade.style.opacity = '1';

    // Bajar música
    const music = document.getElementById('bgMusic');
    let vol = music.volume;
    const fadeOut = setInterval(() => {
      vol = Math.max(0, vol - 0.03);
      music.volume = vol;
      if (vol <= 0) { clearInterval(fadeOut); music.pause(); }
    }, 150);
  }
}

function lerp(a, b, t) { return a + (b - a) * t; }
</script>
